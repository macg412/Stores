name: Notify Field-Hub on push

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch submodule-update to Field-Hub
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/macg412/Field-Hub/dispatches \
            -d '{"event_type":"submodule-update","client_payload":{"submodule":"src/stores"}}'
