<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Storeman</title>
<style>
:root {
  --bg:#0f1114; --surface:#1a1d23; --surface2:#22262e; --surface3:#2a2f3a;
  --border:#2e3340; --border2:#3a4055;
  --accent:#f59e0b; --accent2:#10b981; --danger:#ef4444; --info:#3b82f6;
  --text:#e8eaf0; --muted:#7a8099; --radius:10px;
  --font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.hidden{display:none!important;}

/* ── HEADER ── */
.app-header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:10px;}
.app-header h1{font-size:1.1rem;font-weight:700;color:var(--accent);flex:1;}
.app-header .hbtns{display:flex;gap:8px;flex-shrink:0;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;font-family:var(--font);font-weight:700;font-size:.95rem;cursor:pointer;padding:13px 20px;transition:opacity .15s,transform .1s;white-space:nowrap;line-height:1;}
.btn:active{transform:scale(.97);}
.btn-accent{background:var(--accent);color:#000;}
.btn-green{background:var(--accent2);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-info{background:var(--info);color:#fff;}
.btn-sm{padding:11px 17px;font-size:.88rem;}
.btn-xs{padding:9px 14px;font-size:.82rem;}
.btn-full{width:100%;}
.btn-icon{width:44px;height:44px;padding:0;border-radius:8px;font-size:1.1rem;}
.btn-icon-lg{width:52px;height:52px;padding:0;border-radius:10px;font-size:1.4rem;}

/* ── TABS ── */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;gap:0;overflow-x:auto;}
.tab{padding:14px 20px;font-size:.88rem;font-weight:700;letter-spacing:.04em;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── SECTION LABEL ── */
.slabel{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}

/* ── CARD LIST ── */
.card-list{display:flex;flex-direction:column;gap:8px;padding:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.card:active{background:var(--surface2);}
.card-badge{flex-shrink:0;background:var(--accent);color:#000;font-size:.62rem;font-weight:800;letter-spacing:.06em;padding:3px 7px;border-radius:4px;text-transform:uppercase;}
.card-badge.tpl{background:var(--info);}
.card-info{flex:1;min-width:0;}
.card-title{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-sub{font-size:.72rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-del{background:none;border:none;color:var(--muted);font-size:1.35rem;cursor:pointer;padding:10px 10px;border-radius:6px;flex-shrink:0;transition:color .15s;}
.card-del:hover{color:var(--danger);}

.empty-state{text-align:center;color:var(--muted);padding:48px 20px;font-size:.9rem;}
.empty-icon{font-size:2.8rem;margin-bottom:10px;}

/* ── FORM ── */
.form-scroll{padding:14px 16px 100px;overflow-y:auto;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.span2{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.field input,.field textarea,.field select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.9rem;padding:10px 12px;outline:none;transition:border-color .15s;width:100%;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:65px;}
.req{color:var(--accent);}

/* ── SITES ── */
.sites-area{margin-bottom:14px;}
.site-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.site-header{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;}
.site-name{flex:1;font-weight:700;font-size:.92rem;}
.site-count{font-size:.72rem;color:var(--muted);}
.site-chevron{color:var(--muted);font-size:.9rem;transition:transform .2s;}
.site-chevron.open{transform:rotate(180deg);}
.site-body{padding:10px 12px 12px;}

/* ── PDF PICKER ── */
.pdf-opt-btn{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--border);padding:14px 16px;cursor:pointer;color:var(--text);}
.pdf-opt-btn:last-child{border-bottom:none;}
.pdf-opt-btn:active{background:var(--surface2);}
.pdf-opt-title{font-weight:700;font-size:.95rem;margin-bottom:3px;}
.pdf-opt-sub{font-size:.8rem;color:var(--muted);}
.picker-back{background:none;border:none;color:var(--accent);font-size:.9rem;cursor:pointer;padding:0;}

/* ── SEARCH MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;flex-direction:column;}
.modal-box{background:var(--surface);border-radius:14px 14px 0 0;margin-top:auto;max-height:85vh;display:flex;flex-direction:column;}
.modal-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.modal-title{font-weight:700;font-size:1rem;flex:1;}
.search-input-wrap{position:relative;flex:1;}
.search-input-wrap input{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.92rem;padding:10px 12px 10px 36px;outline:none;width:100%;}
.search-input-wrap input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;}
.search-results{overflow-y:auto;flex:1;}
.search-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background .2s;}
.search-item:active{background:var(--surface2);}
.search-item.added{background:rgba(16,185,129,.18);}
.sq-popup{position:relative;background:var(--surface2);border:1px solid var(--accent);border-radius:10px;padding:12px 14px;margin-top:8px;display:flex;flex-direction:column;gap:10px;z-index:10;}
.sq-label{font-size:.75rem;font-weight:700;color:var(--accent);letter-spacing:.04em;}
.sq-row{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;}
.sq-add-btn{flex-shrink:0;font-size:.95rem;padding:13px 20px;border-radius:8px;font-weight:800;white-space:nowrap;}
.search-done-bar{padding:10px 14px;border-top:2px solid var(--accent2);background:var(--surface);flex-shrink:0;position:relative;z-index:10;}
.search-done-btn{font-size:1.05rem;padding:16px;border-radius:10px;letter-spacing:.03em;}
.si-desc{font-size:.9rem;font-weight:600;}
.si-meta{font-size:.72rem;color:var(--muted);}
.si-cat{display:inline-block;background:var(--surface3);font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:4px;color:var(--muted);letter-spacing:.06em;}
.si-col-label{font-size:.62rem;color:var(--border2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.si-sep{color:var(--border2);margin:0 3px;}
mark{background:transparent;color:var(--accent);font-weight:700;}
.no-results{text-align:center;padding:40px;color:var(--muted);}
.search-filter-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);}
.search-filter-bar select{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.85rem;padding:9px 12px;outline:none;cursor:pointer;}
.search-filter-bar select:focus{border-color:var(--accent);}
.search-count{font-size:.72rem;color:var(--muted);white-space:nowrap;min-width:60px;text-align:right;}

/* ── ITEM ROWS ── */
.item-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.ir-info{}
.ir-desc{font-size:.88rem;font-weight:600;}
.ir-meta{font-size:.7rem;color:var(--muted);margin-top:2px;}
.ir-controls{display:flex;align-items:center;gap:6px;}
.qty-btn{width:56px;height:56px;border:none;border-radius:10px;font-size:1.6rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-minus{background:var(--surface3);color:var(--text);}
.qty-plus{background:var(--accent);color:#000;}
.qty-val{min-width:52px;width:52px;text-align:center;font-size:1rem;font-weight:700;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 4px;-moz-appearance:textfield;color:var(--text);font-family:var(--font);}
.qty-val::-webkit-inner-spin-button,.qty-val::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.ir-del{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:8px;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.ir-del:hover{color:var(--danger);}

/* ── STICKY FOOTER ── */
.sticky-footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;z-index:300;}
.sticky-footer .btn{flex:1;}

/* ── SAVE STATUS ── */
.save-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 0;font-size:.72rem;color:var(--muted);}
.save-bar.saved{color:var(--accent2);}

/* ── TOAST ── */
#toast{position:fixed;top:70px;right:16px;background:var(--accent2);color:#fff;font-size:.78rem;font-weight:700;padding:8px 14px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:900;}
#toast.show{opacity:1;}

/* ── CONFIRM MODAL ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;}
.confirm-box{background:var(--surface);border-radius:14px;padding:24px 20px;max-width:340px;width:100%;}
.confirm-title{font-size:1rem;font-weight:700;margin-bottom:8px;}
.confirm-msg{font-size:.88rem;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btns .btn{flex:1;}

/* ── TEMPLATE NAME MODAL ── */
.tpl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;}
.tpl-box{background:var(--surface);border-radius:14px;padding:24px 20px;max-width:360px;width:100%;}
.tpl-title{font-size:1rem;font-weight:700;margin-bottom:14px;}
.tpl-box input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.95rem;padding:11px 13px;width:100%;outline:none;margin-bottom:14px;}
.tpl-box input:focus{border-color:var(--accent);}
.tpl-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:flex;flex-direction:column;align-items:stretch;}
.tpl-picker-box{background:var(--surface);border-radius:14px 14px 0 0;margin-top:auto;max-height:75vh;display:flex;flex-direction:column;}
.tpl-picker-header{display:flex;align-items:center;padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.tpl-picker-title{flex:1;font-weight:700;font-size:1rem;}
.tpl-pick-list{overflow-y:auto;flex:1;}
.tpl-pick-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.tpl-pick-item:active{background:var(--surface2);}
.tpl-pick-name{font-weight:700;font-size:.92rem;}
.tpl-pick-sub{font-size:.72rem;color:var(--muted);}
.tpl-pick-empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:.88rem;}
.tpl-picker-footer{padding:12px 16px;border-top:1px solid var(--border);}
.tpl-btns{display:flex;gap:10px;}
.tpl-btns .btn{flex:1;}

/* Template editor */
.tpl-editor{padding:14px 16px 100px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>


<!-- ══════════ JOB VIEW ══════════ -->
<div id="view-job">
  <div class="app-header">
    <h1 id="job-heading">New Job</h1>
    <div class="hbtns">
      <button class="btn btn-ghost btn-sm" onclick="openTemplateManager()">📋 Templates</button>
    </div>
  </div>

  <div class="save-bar" id="job-save-bar">Auto-saving…</div>

  <div class="form-scroll" id="job-form-scroll">
    <!-- Job details -->
    <div class="slabel" style="margin-top:10px;">Job Details</div>
    <div class="form-grid">
      <div class="field">
        <label>WO Number <span class="req" id="wo-req">*</span></label>
        <input type="text" id="j-wo" placeholder="WO-12345" oninput="jobChanged()">
      </div>
      <div class="field">
        <label>Job Type <span class="req">*</span></label>
        <select id="j-jobtype" onchange="jobTypeChanged(); applyJobTypeFields()">
          <option value="">— Select —</option>
          <option value="Fault">Fault</option>
          <option value="Project">Project</option>
          <option value="Defect">Defect</option>
          <option value="STORE STOCK REQUIRED">STORE STOCK REQUIRED</option>
        </select>
      </div>

      <!-- Fault only -->
      <div class="field" id="jf-cae" hidden>
        <label>CAE #</label>
        <input type="text" id="j-cae" maxlength="12" placeholder="CAE number" oninput="jobChanged()">
      </div>
      <div class="field" id="jf-je" hidden>
        <label>JE #</label>
        <input type="text" id="j-je" maxlength="12" placeholder="JE number" oninput="jobChanged()">
      </div>
      <!-- Defect / Project -->
      <div class="field" id="jf-downer-wo" hidden>
        <label>Downer WO #</label>
        <input type="text" id="j-downer-wo" maxlength="20" placeholder="Downer WO" oninput="jobChanged()">
      </div>
      <!-- Project only -->
      <div class="field" id="jf-ele" hidden>
        <label>ELE #</label>
        <input type="text" id="j-ele" maxlength="12" placeholder="ELE number" oninput="jobChanged()">
      </div>

      <div class="field span2">
        <label>Job Description / Location</label>
        <input type="text" id="j-loc" placeholder="Site address or description" oninput="jobChanged()">
      </div>
      <div class="field span2">
        <label>Name</label>
        <input type="text" id="j-orderer" placeholder="Your name" oninput="jobChanged()">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="j-date" oninput="jobChanged()">
      </div>
    </div>

    <!-- Sites -->
    <div class="sites-area">
      <div class="slabel" style="margin-bottom:10px;">Sites</div>
      <div id="sites-container"></div>
    </div>
  </div>

  <div class="sticky-footer">
    <button class="btn btn-ghost btn-sm" onclick="addSite()">＋ Site</button>
    <button class="btn btn-info btn-sm" onclick="showPdfPicker()">📄 PDF</button>
    <button class="btn btn-green" onclick="sendOrder()">📧 Send Order</button>
  </div>
</div>

<!-- ══════════ TEMPLATES SCREEN ══════════ -->
<div id="view-tpl" class="hidden">
  <div class="app-header">
    <button class="btn btn-ghost btn-sm" onclick="closeTemplateManager()">← Back to Job</button>
    <h1>Templates</h1>
    <div class="hbtns">
      <button class="btn btn-info btn-sm" onclick="newTemplate()">＋ New</button>
    </div>
  </div>
  <!-- List -->
  <div id="view-tpl-list">
    <div style="padding:10px 16px 6px;">
      <input type="search" id="tpl-search" placeholder="Search templates…" oninput="filterTemplates(this.value)"
        style="width:100%;box-sizing:border-box;padding:8px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:14px;outline:none;">
    </div>
    <div class="card-list" id="tpl-list"></div>
  </div>
  <!-- Editor (hidden until create/edit) -->
  <div id="view-tpl-edit" class="hidden">
    <div class="slabel" style="padding:12px 16px 4px;font-size:12px;letter-spacing:1.5px;" id="tpl-edit-label">New Template</div>
    <div class="tpl-editor" id="tpl-editor-area">
      <div class="slabel" style="margin-bottom:10px;">Template Items</div>
      <div id="tpl-sites-container"></div>
    </div>
    <div class="sticky-footer">
      <button class="btn btn-ghost" onclick="cancelTemplateEdit()">✕ Cancel</button>
      <button class="btn btn-accent" onclick="saveTemplate()">💾 Save Template</button>
    </div>
  </div>
</div>

<!-- ══════════ PDF PICKER ══════════ -->
<div id="pdf-picker" class="modal-overlay hidden" onclick="if(event.target===this)closePdfPicker()">
  <div class="modal-box" style="max-width:420px;align-self:center;width:100%;border-radius:14px 14px 0 0;">
    <div class="modal-header">
      <span class="modal-title">Generate PDF</span>
      <button class="btn btn-ghost btn-sm" onclick="closePdfPicker()">✕</button>
    </div>
    <div>
      <button class="pdf-opt-btn" onclick="doPDF('total')">
        <div class="pdf-opt-title">📊 Gear Total</div>
        <div class="pdf-opt-sub">All gear consolidated across every site — duplicates summed</div>
      </button>
      <button class="pdf-opt-btn" onclick="doPDF('bysite')">
        <div class="pdf-opt-title">📋 Gear by Site</div>
        <div class="pdf-opt-sub">Separate section for each site</div>
      </button>
      <button class="pdf-opt-btn" onclick="showSitePicker()">
        <div class="pdf-opt-title">📍 Site Gear</div>
        <div class="pdf-opt-sub">Pick one site and generate a PDF for it only</div>
      </button>
    </div>
  </div>
</div>

<!-- ══════════ SITE PICKER ══════════ -->
<div id="site-picker" class="modal-overlay hidden" onclick="if(event.target===this)closeSitePicker()">
  <div class="modal-box" style="max-width:420px;align-self:center;width:100%;border-radius:14px 14px 0 0;">
    <div class="modal-header">
      <button class="picker-back" onclick="closeSitePicker();show('pdf-picker')">← Back</button>
      <span class="modal-title" style="margin-left:10px;">Choose Site</span>
      <button class="btn btn-ghost btn-sm" onclick="closeSitePicker()">✕</button>
    </div>
    <div id="site-picker-list"></div>
  </div>
</div>

<!-- ══════════ SEARCH MODAL ══════════ -->
<div id="search-modal" class="modal-overlay hidden" onclick="handleSearchOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search code, description, spec, or category…" oninput="doSearch()" autocomplete="off">
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeSearch()">✕</button>
    </div>
    <div class="search-filter-bar">
      <select id="cat-filter" onchange="doSearch()">
        <option value="">All Categories</option>
        <option value="ARM">ARM</option>
        <option value="ARM BRACE">ARM BRACE</option>
        <option value="BOLT">BOLT</option>
        <option value="BOX">BOX</option>
        <option value="BOX TUDS">BOX TUDS</option>
        <option value="CABLE">CABLE</option>
        <option value="CABLE CLAMP">CABLE CLAMP</option>
        <option value="CABLE COVER">CABLE COVER</option>
        <option value="CABLE GUARD">CABLE GUARD</option>
        <option value="CONDUCTOR">CONDUCTOR</option>
        <option value="DRAW WIRE">DRAW WIRE</option>
        <option value="EARTH">EARTH</option>
        <option value="FUSE">FUSE</option>
        <option value="GUARD">GUARD</option>
        <option value="HEAT SHRINK">HEAT SHRINK</option>
        <option value="INSULATOR">INSULATOR</option>
        <option value="JOIN">JOIN</option>
        <option value="KIT">KIT</option>
        <option value="LIGHTNING ARRESTOR">LIGHTNING ARRESTOR</option>
        <option value="PAD">PAD</option>
        <option value="PIPE">PIPE</option>
        <option value="POLE">POLE</option>
        <option value="SIGN">SIGN</option>
        <option value="STAY">STAY</option>
        <option value="STEEL">STEEL</option>
        <option value="SWITCH">SWITCH</option>
        <option value="TAPE">TAPE</option>
        <option value="TOOL">TOOL</option>
        <option value="TRANSFORMER">TRANSFORMER</option>
        <option value="WASHER">WASHER</option>
      </select>
      <span id="search-count" class="search-count"></span>
    </div>
    <div class="search-results" id="search-results"></div>
    <div class="search-done-bar">
      <button class="btn btn-danger btn-full search-done-btn" onclick="closeSearch()">✕ Close Search</button>
    </div>
  </div>
</div>

<!-- ══════════ CONFIRM MODAL ══════════ -->
<div id="confirm-modal" class="confirm-overlay hidden">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Are you sure?</div>

const DB_NAME='GearOrderV2', DB_VER=1;
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('jobs')) d.createObjectStore('jobs',{keyPath:'id'});
      if(!d.objectStoreNames.contains('templates')) d.createObjectStore('templates',{keyPath:'id'});
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=()=>rej(r.error);
  });
}
function dbPut(store,obj){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(obj);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}
function dbGetAll(store){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function dbDelete(store,id){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}

async function renderTemplates(){
  const tpls=await dbGetAll('templates');
  tpls.sort((a,b)=>(b.savedAt||0)-(a.savedAt||0));
  const el=document.getElementById('tpl-list');
  if(!tpls.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div>No templates yet.<br>Use <strong>+ New Template</strong> or save a job as a template.</div></div>';return;}
  el.innerHTML=tpls.map(t=>{
    const nitems=(t.sites||[]).reduce((s,st)=>s+(st.items||[]).length,0);
    const nsites=(t.sites||[]).length;
    return `<div class="card" onclick="openTemplate('${t.id}')">
      <div class="card-badge tpl">TPL</div>
      <div class="card-info">
        <div class="card-title">${esc(t.name||'Unnamed Template')}</div>
        <div class="card-sub">${nsites} group${nsites!==1?'s':''} · ${nitems} item${nitems!==1?'s':''}</div>
      </div>
      <button class="card-del" onclick="confirmDeleteTpl(event,'${t.id}','${esc(t.name||'this template')}')" title="Delete">🗑</button>
    </div>`;
  }).join('');
}
function filterTemplates(q){
  const term=q.trim().toLowerCase();
  document.querySelectorAll('#tpl-list .card').forEach(card=>{
    const title=card.querySelector('.card-title')?.textContent.toLowerCase()||'';
    card.style.display=(!term||title.includes(term))?'':'none';
  });
}
function goHome(){
  if(window.parent!==window){
    window.parent.postMessage({type:'APP_DONE'},'*');
  } else {
    newJob();
  }
}

  addSiteToJob('Site 1');

}
function renderJobView(){
  document.getElementById('j-wo').value=currentJob.wo||'';
  document.getElementById('j-jobtype').value=currentJob.jobType||'';
  updateWoRequired(currentJob.jobType||'');
  document.getElementById('j-loc').value=currentJob.loc||'';
  document.getElementById('j-orderer').value=currentJob.orderer||'';
  document.getElementById('j-cae').value=currentJob.caeNumber||'';

function applyJobTypeFields(){

function jobTypeChanged(){

function updateWoRequired(jobType){

function scheduleAutoSave(){

  setSaveBar('Saving…',false);
  autoSaveTimer=setTimeout(()=>performJobSave(false),1500);
}
function performJobSave(silent){
  if(!currentJob)return;
  currentJob.savedAt=Date.now();
  if(_hubDocId && window.parent !== window){
    window.parent.postMessage({type:'DRAFT_SAVE',docId:_hubDocId,payload:JSON.parse(JSON.stringify(currentJob))},'*');

function toggleSite(sid){

  body.style.display=site.open?'':'none';
  chev.classList.toggle('open',site.open);
}
function renameSite(sid,val){
  const site=currentJob.sites.find(s=>s.id===sid);
  if(site){site.name=val; scheduleAutoSave();}
}
function renderSiteItems(sid){
  const site=currentJob.sites.find(s=>s.id===sid);
  if(!site)return;
  const el=document.getElementById('site-items-'+sid);
  if(!el)return;
  const cnt=document.getElementById('site-count-'+sid);
  if(cnt)cnt.textContent=site.items.length+' item'+(site.items.length!==1?'s':'');
  if(!site.items.length){el.innerHTML='<div style="color:var(--muted);font-size:.8rem;padding:6px 0 2px;">No items yet — tap Add Items to search.</div>';return;}
  el.innerHTML=site.items.map((item,ii)=>`
    <div class="item-row">
      <div class="ir-info">
        <div class="ir-desc">${esc(item.b)}</div>
        <div class="ir-meta">${esc(item.a)}${item.c?' · '+esc(item.c):''}${item.d?' · <span class="si-cat">'+esc(item.d)+'</span>':''}</div>
      </div>
      <div class="ir-controls">
        <button class="qty-btn qty-minus" ontouchstart="" onclick="changeQty('${sid}',${ii},-1)">−</button>
        <input type="number" class="qty-val" id="qv-${sid}-${ii}" value="${item.qty||1}" min="1" onclick="this.select()" oninput="setQty('${sid}',${ii},this.value)">

}
function changeQty(sid,ii,delta){
  const site=currentJob.sites.find(s=>s.id===sid);
  if(!site)return;
  site.items[ii].qty=Math.max(1,(site.items[ii].qty||1)+delta);
  const el=document.getElementById('qv-'+sid+'-'+ii);
  if(el)el.value=site.items[ii].qty;
  scheduleAutoSave();
}
function removeItem(sid,ii){
  const site=currentJob.sites.find(s=>s.id===sid);
  if(!site)return;
  site.items.splice(ii,1);
  renderSiteItems(sid);
  scheduleAutoSave();
}

async function applyTemplate(sid){
  const tpls=await dbGetAll('templates');

function showTplPicker(sid, tpls){
  // Remove any existing picker
  const old=document.getElementById('tpl-picker-overlay'); if(old) old.remove();

  const overlay=document.createElement('div');
  overlay.id='tpl-picker-overlay';
  overlay.className='tpl-picker-overlay';
  // Store sid and tpls directly on the element — avoids any closure/global issue
  overlay.dataset.sid = sid;
  overlay._tpls = tpls;

  const itemsHtml = tpls.length
    ? tpls.map((t,i)=>{
        const n=(t.sites||[]).reduce((s,st)=>s+(st.items||[]).length,0);
        return `<div class="tpl-pick-item" onclick="applyTplToSite(${i})">
          <div class="tpl-pick-name">${esc(t.name||'Unnamed')}</div>
          <div class="tpl-pick-sub">${n} item${n!==1?'s':''}</div>
        </div>`;
      }).join('')
    : `<div class="tpl-pick-empty">No templates saved yet.</div>`;

  overlay.innerHTML=`
    <div class="tpl-picker-box">
      <div class="tpl-picker-header">
        <div class="tpl-picker-title">Apply Template to Site</div>
        <button class="card-del" onclick="document.getElementById('tpl-picker-overlay').remove()">✕</button>
      </div>
      <div class="tpl-pick-list">${itemsHtml}</div>
      <div class="tpl-picker-footer">
        <button class="btn btn-info btn-full" onclick="document.getElementById('tpl-picker-overlay').remove();newTemplate()">＋ Create New Template</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
}

function applyTplToSite(tplIdx){
  const overlay=document.getElementById('tpl-picker-overlay');
  if(!overlay) return;
  const sid=overlay.dataset.sid;
  const tpl=overlay._tpls[tplIdx];
  if(!tpl||!sid) return;
  const site=currentJob.sites.find(s=>s.id===sid);
  if(!site) return;
  (tpl.sites||[]).forEach(ts=>{
    (ts.items||[]).forEach(item=>{
      site.items.push({...item,qty:item.qty||1});
    });
  });
  renderSiteItems(sid);
  scheduleAutoSave();
  overlay.remove();
  showToast('✓ Template applied');
}

let searchTarget=null; // {sid, mode:'job'|'tpl'}
function openSearch(sid,mode){
  searchTarget={sid,mode};
  document.getElementById('search-input').value='';
  document.getElementById('cat-filter').value='';
  document.getElementById('search-count').textContent='';
  document.getElementById('search-results').innerHTML='<div class="no-results">Start typing or pick a category…</div>';
  show('search-modal');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
}
function closeSearch(){
  const popup=document.getElementById('sq-popup'); if(popup) popup.remove();
  hide('search-modal');
  searchTarget=null;
}
function handleSearchOverlayClick(e){
  // Only close if tapping the dark backdrop, not the modal-box itself
  if(e.target===document.getElementById('search-modal')) closeSearch();
}
function doSearch(){
  const existing=document.getElementById('sq-popup'); if(existing) existing.remove();
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const cat=document.getElementById('cat-filter').value;
  const el=document.getElementById('search-results');
  const countEl=document.getElementById('search-count');
  if(!q && !cat){el.innerHTML='<div class="no-results">Start typing or pick a category…</div>';countEl.textContent='';return;}
  const terms=q?q.split(/\s+/):[];
  const hits=CATALOGUE.filter(item=>{
    if(cat && item.d!==cat) return false;
    if(!terms.length) return true;
    const haystack=(item.a+' '+item.b+' '+item.c+' '+item.d).toLowerCase();
    return terms.every(t=>haystack.includes(t));
  });
  countEl.textContent=hits.length+' result'+(hits.length!==1?'s':'');
  const shown=hits.slice(0,80);
  if(!shown.length){el.innerHTML='<div class="no-results">No items found.</div>';return;}
  // Store hits in a lookup map so onclick can reference by index (avoids JSON-in-HTML-attribute encoding bugs)
  window._searchHits = shown;
  el.innerHTML=shown.map((item,i)=>`
    <div class="search-item" onclick="pickItem(${i})">
      <div class="si-desc">${highlight(esc(item.b),q)}</div>
      <div class="si-meta">
        <span class="si-col-label">Code:</span> ${highlight(esc(item.a),q)}
        ${item.c?'<span class="si-sep">·</span><span class="si-col-label">Spec:</span> '+highlight(esc(item.c),q):''}
        <span class="si-sep">·</span><span class="si-cat">${highlight(esc(item.d),q)}</span>
      </div>
    </div>`).join('');
}
function highlight(text,q){
  const terms=q.trim().toLowerCase().split(/\s+/);
  terms.forEach(t=>{
    if(!t)return;
    const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    text=text.replace(re,'<mark>$1</mark>');
  });
  return text;
}
// Tracks pending qty for items not yet added (first tap)
const _pendingQty = {};  // key: hitIdx -> qty

function pickItem(idx){
  const item=window._searchHits[idx];
  if(!item)return;
  if(!searchTarget)return;
  const {sid,mode}=searchTarget;

  // Close any popup on a different row
  const existing=document.getElementById('sq-popup');
  if(existing){
    const existingIdx=parseInt(existing.dataset.hitIdx);
    if(existingIdx!==idx){ existing.remove(); delete _pendingQty[existingIdx]; }
    else return; // tapping same row that already has popup open — do nothing
  }

  const siteList = mode==='job'
    ? (currentJob.sites.find(s=>s.id===sid)||{items:[]}).items
    : (currentTpl.sites.find(s=>s.id===sid)||{items:[]}).items;

  const existingIdx = siteList.findIndex(x=>x.a===item.a && x.b===item.b && x.c===item.c);

  if(existingIdx !== -1){
    // Already in list — show adjust popup
    showSqPopup(idx, sid, mode, 'existing', existingIdx, siteList[existingIdx].qty||1);
  } else {
    // Not yet added — show qty selector with Add+ button
    _pendingQty[idx] = 1;
    showSqPopup(idx, sid, mode, 'new', -1, 1);
  }
}

function showSqPopup(hitIdx, sid, mode, type, existingIdx, startQty){
  const rows = document.querySelectorAll('#search-results .search-item');
  const anchor = rows[hitIdx];
  if(!anchor) return;

  const popup = document.createElement('div');
  popup.id = 'sq-popup';
  popup.className = 'sq-popup';
  popup.dataset.hitIdx = hitIdx;
  popup.dataset.sid = sid;
  popup.dataset.mode = mode;
  popup.dataset.type = type;
  popup.dataset.existingIdx = existingIdx;

  if(type==='new'){
    popup.innerHTML = `
      <div class="sq-label">Set quantity:</div>
      <div class="sq-row">
        <button class="qty-btn qty-minus" ontouchstart="" onclick="sqAdjust(${hitIdx},-1)">−</button>
        <input type="number" class="qty-val" id="sq-qty" value="${startQty}" min="1" onclick="this.select()" oninput="sqAdjustManual(${hitIdx},this.value)">
        <button class="qty-btn qty-plus" ontouchstart="" onclick="sqAdjust(${hitIdx},1)">＋</button>
        <button class="btn btn-green sq-add-btn" ontouchstart="" onclick="sqConfirmAdd(${hitIdx})">Add＋</button>
      </div>`;
  } else {
    popup.innerHTML = `
      <div class="sq-label">Already in list — adjust qty:</div>
      <div class="sq-row">
        <button class="qty-btn qty-minus" ontouchstart="" onclick="sqAdjust(${hitIdx},-1)">−</button>
        <input type="number" class="qty-val" id="sq-qty" value="${startQty}" min="1" onclick="this.select()" oninput="sqAdjustManual(${hitIdx},this.value)">
        <button class="qty-btn qty-plus" ontouchstart="" onclick="sqAdjust(${hitIdx},1)">＋</button>
        <button class="btn btn-danger sq-add-btn" ontouchstart="" onclick="sqRemove(${hitIdx})">Remove</button>
      </div>`;
  }

  anchor.appendChild(popup);
  // Scroll the row into view
  anchor.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function sqAdjust(hitIdx, delta){
  const popup=document.getElementById('sq-popup');
  if(!popup) return;
  const type=popup.dataset.type;
  const sid=popup.dataset.sid;
  const mode=popup.dataset.mode;
  const existingIdx=parseInt(popup.dataset.existingIdx);

  if(type==='new'){
    _pendingQty[hitIdx]=Math.max(1,(_pendingQty[hitIdx]||1)+delta);
    const el=document.getElementById('sq-qty');
    if(el) el.value=_pendingQty[hitIdx];
  } else {
    const siteList=mode==='job'
      ? (currentJob.sites.find(s=>s.id===sid)||{items:[]}).items
      : (currentTpl.sites.find(s=>s.id===sid)||{items:[]}).items;
    if(siteList[existingIdx]){
      siteList[existingIdx].qty=Math.max(1,(siteList[existingIdx].qty||1)+delta);
      const el=document.getElementById('sq-qty');
      if(el) el.value=siteList[existingIdx].qty;
      if(mode==='job'){renderSiteItems(sid);scheduleAutoSave();}
      else{renderTplSiteItems(sid);}
    }
  }
}
function sqAdjustManual(hitIdx, val){
  const popup=document.getElementById('sq-popup');
  if(!popup) return;
  const n=parseInt(val);
  if(isNaN(n)||n<1) return;
  const type=popup.dataset.type;
  const sid=popup.dataset.sid;
  const mode=popup.dataset.mode;
  const existingIdx=parseInt(popup.dataset.existingIdx);
  if(type==='new'){
    _pendingQty[hitIdx]=n;
  } else {
    const siteList=mode==='job'
      ? (currentJob.sites.find(s=>s.id===sid)||{items:[]}).items
      : (currentTpl.sites.find(s=>s.id===sid)||{items:[]}).items;
    if(siteList[existingIdx]){
      siteList[existingIdx].qty=n;
      if(mode==='job'){renderSiteItems(sid);scheduleAutoSave();}
      else{renderTplSiteItems(sid);}
    }
  }
}

function sqConfirmAdd(hitIdx){
  const popup=document.getElementById('sq-popup');
  if(!popup) return;
  const sid=popup.dataset.sid;
  const mode=popup.dataset.mode;
  const qty=_pendingQty[hitIdx]||1;
  const item=window._searchHits[hitIdx];
  if(!item) return;

  if(mode==='job'){
    const site=currentJob.sites.find(s=>s.id===sid);
    if(site){site.items.push({...item,qty});renderSiteItems(sid);scheduleAutoSave();}
  } else {
    const site=currentTpl.sites.find(s=>s.id===sid);
    if(site){site.items.push({...item,qty});renderTplSiteItems(sid);}
  }
  delete _pendingQty[hitIdx];
  popup.remove();
  closeSearch();
}

function sqRemove(hitIdx){
  const popup=document.getElementById('sq-popup');
  if(!popup) return;
  const sid=popup.dataset.sid;
  const mode=popup.dataset.mode;
  const existingIdx=parseInt(popup.dataset.existingIdx);
  const site=mode==='job'
    ? currentJob.sites.find(s=>s.id===sid)
    : currentTpl.sites.find(s=>s.id===sid);
  if(!site) return;
  site.items.splice(existingIdx,1);
  if(mode==='job'){renderSiteItems(sid);scheduleAutoSave();}
  else{renderTplSiteItems(sid);}
  popup.remove();
}

//  SEND ORDER
// ═══════════════════════════════════════════
function sendOrder(){
  collectJobFields();
  if(!currentJob.jobType){alert('Please select a Job Type first.');document.getElementById('j-jobtype').focus();return;}
  if(!currentJob.wo && currentJob.jobType!=='STORE STOCK REQUIRED'){alert('Please enter a WO Number first.');document.getElementById('j-wo').focus();return;}
  const allItems=currentJob.sites.reduce((a,s)=>a+(s.items||[]).length,0);
  if(!allItems){alert('Add at least one item before sending.');return;}

  const div='─'.repeat(52);
  const today=new Date().toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'});
  let body=`GEAR / MATERIAL ORDER REQUEST\n${div}\n\n`;
  if(currentJob.jobType) body+=`Job Type:      ${boldText(currentJob.jobType)}\n`;
  if(currentJob.wo)     body+=`WO Number:     ${boldText(currentJob.wo)}\n`;
  if(currentJob.jobType==='Fault'){
    if(currentJob.caeNumber) body+=`CAE #:         ${boldText(currentJob.caeNumber)}\n`;
    if(currentJob.jeNumber)  body+=`JE #:          ${boldText(currentJob.jeNumber)}\n`;
  }
  if(currentJob.jobType==='Defect'||currentJob.jobType==='Project'){
    if(currentJob.downerWO)  body+=`Downer WO #:   ${boldText(currentJob.downerWO)}\n`;
  }
  if(currentJob.jobType==='Project'){
    if(currentJob.eleNumber) body+=`ELE #:         ${boldText(currentJob.eleNumber)}\n`;
  }
  if(currentJob.loc)     body+=`Job Description: ${boldText(currentJob.loc)}\n`;
  body+=`Date Requested: ${boldText(today)}\n`;
  if(currentJob.orderer) body+=`Name:          ${boldText(currentJob.orderer)}\n`;
  body+='\n';

  // Consolidate all items across all sites, summing qty for duplicates
  const consolidated = {};
  currentJob.sites.forEach(site=>{
    (site.items||[]).forEach(item=>{
      const key = item.a+'||'+item.b+'||'+(item.c||'');
      if(consolidated[key]){
        consolidated[key].qty += (item.qty||1);
      } else {
        consolidated[key] = {...item, qty: item.qty||1};
      }
    });
  });
  const consolidatedItems = Object.values(consolidated);
  if(consolidatedItems.length){
    body+=`${div}\n`;
    consolidatedItems.forEach(item=>{
      const spec = item.c ? ` (${item.c})` : '';
      body+=`${boldText(item.a)}  ${item.b}${spec} - Qty: ${boldText(item.qty)}\n`;
    });
    body+='\n';
  }

  body+=`${div}\nSent via Gear Order App — Downer NZ Ltd.\n`;

  const woLabel = currentJob.wo || currentJob.jobType || 'Order';
  const subj=`Gear Order — ${woLabel}${currentJob.loc?' — '+currentJob.loc:''}`;
  window.location.href=`mailto:?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  // Also generate a Gear Total PDF for the stores counter
  setTimeout(()=>doPDF('total', null, true), 800);
}

    div.className='site-block'; div.id='tsite-block-'+site.id;

      <div class="site-header" onclick="toggleTplSite('${site.id}')">
        <input type="text" value="${escAttr(site.name)}"
          onclick="event.stopPropagation()"
          oninput="renameTplSite('${site.id}',this.value)"
          style="background:transparent;border:none;color:var(--text);font-weight:700;font-size:.92rem;outline:none;flex:1;cursor:text;min-width:0;">
        <span class="site-count" id="tsite-count-${site.id}">${site.items.length} item${site.items.length!==1?'s':''}</span>

    c.appendChild(div);

function toggleTplSite(sid){
  const site=currentTpl.sites.find(s=>s.id===sid);
  if(!site)return;
  site.open=site.open===false?true:false;
  const body=document.getElementById('tsite-body-'+sid);
  const chev=document.getElementById('tsite-chev-'+sid);
  body.style.display=site.open?'':'none';
  chev.classList.toggle('open',site.open);
}
function renameTplSite(sid,val){const site=currentTpl.sites.find(s=>s.id===sid);if(site)site.name=val;}
function renderTplSiteItems(sid){
  const site=currentTpl.sites.find(s=>s.id===sid);
  if(!site)return;
  const el=document.getElementById('tsite-items-'+sid);
  if(!el)return;
  const cnt=document.getElementById('tsite-count-'+sid);
  if(cnt)cnt.textContent=site.items.length+' item'+(site.items.length!==1?'s':'');
  if(!site.items.length){el.innerHTML='<div style="color:var(--muted);font-size:.8rem;padding:6px 0 2px;">No items yet.</div>';return;}
  el.innerHTML=site.items.map((item,ii)=>`
    <div class="item-row">
      <div class="ir-info">
        <div class="ir-desc">${esc(item.b)}</div>
        <div class="ir-meta">${esc(item.a)}${item.c?' · '+esc(item.c):''} <span class="si-cat">${esc(item.d)}</span></div>
      </div>
      <div class="ir-controls">
        <button class="qty-btn qty-minus" ontouchstart="" onclick="changeTplQty('${sid}',${ii},-1)">−</button>
        <input type="number" class="qty-val" id="tqv-${sid}-${ii}" value="${item.qty||1}" min="1" onclick="this.select()" oninput="setTplQty('${sid}',${ii},this.value)">
        <button class="qty-btn qty-plus" ontouchstart="" onclick="changeTplQty('${sid}',${ii},1)">＋</button>
        <button class="ir-del" onclick="removeTplItem('${sid}',${ii})">✕</button>
      </div>
    </div>`).join('');
}
function changeTplQty(sid,ii,delta){
  const site=currentTpl.sites.find(s=>s.id===sid);
  if(!site)return;
  site.items[ii].qty=Math.max(1,(site.items[ii].qty||1)+delta);
  const el=document.getElementById('tqv-'+sid+'-'+ii);
  if(el)el.value=site.items[ii].qty;
}
function setTplQty(sid,ii,val){
  const site=currentTpl.sites.find(s=>s.id===sid);
  if(!site)return;
  const n=parseInt(val);
  site.items[ii].qty=(!isNaN(n)&&n>=1)?n:1;
}
function removeTplItem(sid,ii){
  const site=currentTpl.sites.find(s=>s.id===sid);
  if(!site)return;
  site.items.splice(ii,1);
  renderTplSiteItems(sid);
}

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function padR(s,n){return String(s).padEnd(n,' ').substring(0,n);}
function boldText(str){
  // Convert to Unicode Mathematical Bold characters so values appear bold in plain-text email
  const s=String(str);
  let out='';
  for(let i=0;i<s.length;i++){
    const c=s.charCodeAt(i);
    if(c>=65&&c<=90) out+=String.fromCodePoint(0x1D400+(c-65));      // A-Z
    else if(c>=97&&c<=122) out+=String.fromCodePoint(0x1D41A+(c-97)); // a-z
    else if(c>=48&&c<=57) out+=String.fromCodePoint(0x1D7CE+(c-48));  // 0-9
    else out+=s[i];
  }
  return out;
}
function fmtDateShort(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y.slice(2);}
function fmtDateLong(iso){if(!iso)return'';const[y,m,d]=iso.split('-');const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return parseInt(d)+' '+mn[parseInt(m)-1]+' '+y;}

function nextDocketNo(){
  const key='storemanDocketNo';
  const n=parseInt(localStorage.getItem(key)||'59999999');
  const next=n+1;
  localStorage.setItem(key,String(next));
  return next;
}

async function doPDF(mode, siteId, silent){
  hide('pdf-picker'); hide('site-picker');
  collectJobFields();

  const {PDFDocument,rgb,StandardFonts}=PDFLib;
  const pdfDoc=await PDFDocument.create();
  const fontBold=await pdfDoc.embedFont(StandardFonts.HelveticaBold);
  const fontReg=await pdfDoc.embedFont(StandardFonts.Helvetica);

  const A4W=595, A4H=842;
  const ML=40, MR=40, MT=40, MB=40;
  const CW=A4W-ML-MR;
  // Teal #006B5E
  const TEAL=[0,0.420,0.369];
  const WHITE=[1,1,1];
  const DARK=[0.05,0.05,0.05];
  const MID=[0.45,0.45,0.45];
  const LIGHT=[0.97,0.97,0.97];

  let page=pdfDoc.addPage([A4W,A4H]);
  let y=A4H-MT;

  const docketNo=nextDocketNo();

  const today=currentJob.date
    ? new Date(currentJob.date+'T12:00:00').toLocaleDateString('en-NZ',{day:'2-digit',month:'2-digit',year:'numeric'})
    : new Date().toLocaleDateString('en-NZ',{day:'2-digit',month:'2-digit',year:'numeric'});

  function newPage(){
    page=pdfDoc.addPage([A4W,A4H]);
    y=A4H-MT;
    // Continuation header
    page.drawRectangle({x:0,y:A4H-36,width:A4W,height:36,color:rgb(...TEAL)});
    page.drawText(`STORES ISSUE — DOCKET NO. ${docketNo}  (cont.)`,{x:ML,y:A4H-24,size:10,font:fontBold,color:rgb(...WHITE)});
    y=A4H-54;
  }

  function checkY(needed){if(y-needed<MB)newPage();}

  function drawLine(x1,y1,x2,y2,thickness=0.4,col=MID){
    page.drawLine({start:{x:x1,y:y1},end:{x:x2,y:y2},thickness,color:rgb(...col)});
  }

  function txt(str,x,ty,size,font,col,maxW){
    let s=String(str||'');
    const c=col||DARK;
    if(maxW&&font.widthOfTextAtSize(s,size)>maxW){
      while(s.length>1&&font.widthOfTextAtSize(s+'…',size)>maxW)s=s.slice(0,-1);
      s+='…';
    }
    page.drawText(s,{x,y:ty,size,font,color:rgb(...c)});
  }

  // ── TEAL HEADER ──────────────────────────────────────────────
  const hdrH=54;
  page.drawRectangle({x:0,y:A4H-hdrH,width:A4W,height:hdrH,color:rgb(...TEAL)});
  txt('STORES ISSUE: DOCKET NO. '+docketNo, ML, A4H-34, 18, fontBold, WHITE);
  y=A4H-hdrH-16;

  // ── JOB DETAILS BLOCK ─────────────────────────────────────────
  const detailRows=[
    ['Job Type', currentJob.jobType||'—'],
    ['WO Number', currentJob.wo||'N/A'],
    (currentJob.jobType==='Fault'&&currentJob.caeNumber)?['CAE #', currentJob.caeNumber]:null,
    (currentJob.jobType==='Fault'&&currentJob.jeNumber)?['JE #', currentJob.jeNumber]:null,
    ((currentJob.jobType==='Defect'||currentJob.jobType==='Project')&&currentJob.downerWO)?['Downer WO #', currentJob.downerWO]:null,
    (currentJob.jobType==='Project'&&currentJob.eleNumber)?['ELE #', currentJob.eleNumber]:null,
    currentJob.loc?['Description', currentJob.loc]:null,
    currentJob.orderer?['Name', currentJob.orderer]:null,
    ['Date', today],
  ].filter(Boolean);

  const lblW=100, valX=ML+lblW+8;
  detailRows.forEach(([lbl,val])=>{
    checkY(14);
    txt(lbl+':',ML,y,9,fontBold,MID);
    txt(val,valX,y,9,fontReg,DARK,CW-lblW-10);
    y-=13;
  });
  y-=8;
  drawLine(ML,y,ML+CW,y,0.6,TEAL);
  y-=16;

  // ── BUILD SECTIONS ────────────────────────────────────────────
  // Columns: IV Code | Description | Spec | UOM | Qty
  const colCode=ML,        colCodeW=52;
  const colDesc=ML+56,     colDescW=220;
  const colSpec=ML+280,    colSpecW=100;
  const colUom=ML+384,     colUomW=36;
  const colQty=ML+424,     colQtyW=CW-(424);

  function drawTableHeader(){
    checkY(22);
    page.drawRectangle({x:ML,y:y-5,width:CW,height:20,color:rgb(...TEAL)});
    txt('IV CODE',  colCode, y+2, 8, fontBold, WHITE);
    txt('DESCRIPTION', colDesc, y+2, 8, fontBold, WHITE);
    txt('SPEC',     colSpec, y+2, 8, fontBold, WHITE);
    txt('UOM',      colUom,  y+2, 8, fontBold, WHITE);
    txt('QTY',      colQty,  y+2, 8, fontBold, WHITE);
    y-=24;
  }

  function drawItems(items){
    drawTableHeader();
    items.forEach((item,ii)=>{
      checkY(14);
      if(ii%2===0){
        page.drawRectangle({x:ML,y:y-4,width:CW,height:13,color:rgb(...LIGHT)});
      }
      txt(item.a||'', colCode, y, 8.5, fontBold, DARK, colCodeW);
      txt(item.b||'', colDesc, y, 8.5, fontReg,  DARK, colDescW);
      txt(item.c||'', colSpec, y, 8,   fontReg,  MID,  colSpecW);
      txt('EA',       colUom,  y, 8.5, fontReg,  DARK);
      txt(String(item.qty||1), colQty, y, 8.5, fontBold, DARK);
      y-=13;
    });
    y-=6;
  }

  if(mode==='total'){
    // Consolidate all items, sum duplicates
    const map={};
    currentJob.sites.forEach(site=>{
      (site.items||[]).forEach(item=>{
        const k=item.a+'||'+item.b+'||'+(item.c||'');
        if(map[k]){map[k].qty+=(item.qty||1);}
        else{map[k]={...item,qty:item.qty||1};}
      });
    });
    drawItems(Object.values(map));

  } else if(mode==='bysite'){
    const sitesWithItems=currentJob.sites.filter(s=>(s.items||[]).length>0);
    sitesWithItems.forEach((site,si)=>{
      checkY(50);
      // Site sub-header
      page.drawRectangle({x:ML,y:y-4,width:CW,height:18,color:rgb(0.12,0.12,0.15)});
      txt(site.name.toUpperCase(), ML+6, y+1, 9, fontBold, WHITE);
      txt(site.items.length+' item'+(site.items.length!==1?'s':''), ML+CW-60, y+1, 8, fontReg, [0.7,0.7,0.7]);
      y-=22;
      drawItems(site.items);
      if(si<sitesWithItems.length-1){drawLine(ML,y,ML+CW,y,0.3,MID);y-=10;}
    });

  } else if(mode==='singlesite'){
    const site=currentJob.sites.find(s=>s.id===siteId);
    if(site){
      // Site label above table
      page.drawRectangle({x:ML,y:y-4,width:CW,height:18,color:rgb(0.12,0.12,0.15)});
      txt(site.name.toUpperCase(), ML+6, y+1, 9, fontBold, WHITE);
      y-=22;
      drawItems(site.items);
    }
  }

  // ── FOOTER on every page ──────────────────────────────────────
  const pages=pdfDoc.getPages();
  pages.forEach((pg,i)=>{
    pg.drawLine({start:{x:ML,y:MB+14},end:{x:A4W-MR,y:MB+14},thickness:0.4,color:rgb(...TEAL)});
    pg.drawText('Downer NZ Ltd.  —  Storeman',{x:ML,y:MB+2,size:7,font:fontReg,color:rgb(...MID)});
    pg.drawText(`Page ${i+1} of ${pages.length}`,{x:A4W-MR-50,y:MB+2,size:7,font:fontReg,color:rgb(...MID)});
  });

  // ── SAVE & DOWNLOAD ───────────────────────────────────────────
  const bytes=await pdfDoc.save();
  const blob=new Blob([bytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const modeLabel=mode==='total'?'Total':mode==='bysite'?'BySite':'Site';
  const fname=`StoresIssue_${docketNo}_${currentJob.wo||'Order'}_${modeLabel}.pdf`;
  a.href=url; a.download=fname; a.click();
  URL.revokeObjectURL(url);
  if(!silent) showToast('✓ PDF downloaded — Docket #'+docketNo);

  // Upload to hub when embedded in a job folder
  if(window.parent!==window && _hubDocId){
    const reader=new FileReader();
    reader.onloadend=()=>{
      window.parent.postMessage({type:'SAVE_PDF',docId:_hubDocId,pdfDataUri:reader.result,formPayload:JSON.parse(JSON.stringify(currentJob)),fileName:fname},'*');
      if(!silent) window.parent.postMessage({type:'APP_DONE'},'*');
    };
    reader.readAsDataURL(new Blob([bytes],{type:'application/pdf'}));
  }
}
</script>

<script>
(function(){
  function applyContext(ctx) {
    if (ctx.docId) _hubDocId = ctx.docId;

    function setVal(id, val) {
      var el = document.getElementById(id);
      if (!el || val == null || val === '') return;
      if (el.value) return;
      el.value = val;
      el.dispatchEvent(new Event('input',  { bubbles: true }));
      el.dispatchEvent(new Event('change', { bubbles: true }));
    }
    var apply = function() {
      // If the hub sends back a saved payload, restore the draft from it
      if (ctx.payload && typeof currentJob !== 'undefined') {
        currentJob = JSON.parse(JSON.stringify(ctx.payload));
        if (typeof renderJobView === 'function') renderJobView();
        return;
      }
      // No saved payload — fresh job, auto-fill from hub context
      if (typeof newJob === 'function') newJob();
      if (typeof currentJob !== 'undefined' && currentJob) {
        if (ctx.wo)                           currentJob.wo         = ctx.wo;
        if (ctx.jobType)                      currentJob.jobType    = ctx.jobType;
        if (ctx.address || ctx.name)          currentJob.loc        = ctx.address || ctx.name;
        if (ctx.userName)                     currentJob.orderer    = ctx.userName;
        if (ctx.cae)                          currentJob.caeNumber  = ctx.cae;
        if (ctx.je)                           currentJob.jeNumber   = ctx.je;
        if (ctx.downer_wo_number)             currentJob.downerWO   = ctx.downer_wo_number;
        if (ctx.ele_number)                   currentJob.eleNumber  = ctx.ele_number;
        if (typeof renderJobView === 'function') renderJobView();
        if (typeof scheduleAutoSave === 'function') { try { scheduleAutoSave(); } catch(e){} }
      }
    };
    if (document.getElementById('j-wo')) apply();
    else document.addEventListener('DOMContentLoaded', apply);
  }
  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'JOB_CONTEXT') applyContext(e.data);
  });
  if (window.parent !== window) window.parent.postMessage({ type:'EMBED_READY', app:'storeman' }, '*');
})();
</script>
